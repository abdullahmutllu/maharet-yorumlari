<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Çankaya Restoran Yorumları — Veri Seti</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero">
      <div class="hero-inner">
        <p class="eyebrow">Veri Seti · <a href="index.html">Maharet Yorumlar</a> · <a href="kesfet.html">Keşfet</a></p>
        <h1>Çankaya Restoran Yorumları</h1>

        <div class="summary" id="summary">
          <div class="summary-score">
            <span id="avg-rating">–</span>
            <div class="summary-score-meta">
              <div class="stars" id="avg-stars" aria-hidden="true"></div>
              <span class="muted" id="total-count">yükleniyor…</span>
            </div>
          </div>
          <div class="summary-meta">
            <label class="branch-pick">
              <span class="muted">Restoran:</span>
              <select id="rest-select" aria-label="Restoran seçin"></select>
            </label>
          </div>
        </div>

        <div class="rating-dist" id="rating-dist"></div>

        <p class="muted" id="dataset-info" style="margin: 14px 0 0"></p>
      </div>
    </header>

    <main class="container">
      <section class="controls" id="controls">
        <input type="search" id="search" class="search" placeholder="Yorumlarda ara (metin / kişi)…" autocomplete="off" />
        <div class="filters" id="rating-filters" role="group" aria-label="Puana göre filtrele">
          <button class="chip is-active" data-rating="all" type="button">Tümü</button>
          <button class="chip" data-rating="5" type="button">5 ★</button>
          <button class="chip" data-rating="4" type="button">4 ★</button>
          <button class="chip" data-rating="3" type="button">3 ★</button>
          <button class="chip" data-rating="2" type="button">2 ★</button>
          <button class="chip" data-rating="1" type="button">1 ★</button>
        </div>
        <div class="export" id="export">
          <span class="muted">İndir:</span>
          <button type="button" class="chip" data-fmt="csv">CSV</button>
          <button type="button" class="chip" data-fmt="xlsx">Excel</button>
          <button type="button" class="chip" data-fmt="json">JSON</button>
        </div>
        <label class="sort">
          <span class="muted">Sırala:</span>
          <select id="sort">
            <option value="newest">En yeni</option>
            <option value="oldest">En eski</option>
            <option value="highest">En yüksek puan</option>
            <option value="lowest">En düşük puan</option>
            <option value="author">Yazarın yorum sayısı</option>
          </select>
        </label>
      </section>

      <p class="result-count muted" id="result-count"></p>
      <section id="reviews" class="reviews" aria-live="polite"></section>
    </main>

    <footer class="footer">
      <p class="muted">
        Tüm veri seti:
        <a id="dl-csv" href="cankaya-ornek-combined.csv" download>birleşik CSV</a> ·
        <a id="dl-json" href="cankaya-ornek-combined.json" download>birleşik JSON</a>.
        Veriler Google Maps'ten; yalnızca görüntüleme amaçlı.
      </p>
    </footer>

    <script src="cankaya.js"></script>
  </body>
</html>
